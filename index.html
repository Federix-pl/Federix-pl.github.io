<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rompecabezas Declinaciones Latinas</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { margin: 0; padding: 0; background-color: #f8fafc; overflow: hidden; }
        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        @keyframes scale-up { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes unlock-bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        @keyframes subtle-pulse { 0%, 100% { background-color: rgba(255,255,255,0.6); } 50% { background-color: rgba(219,234,254,0.9); border-color: #60a5fa; } }
        @keyframes shake {
            0% { transform: translateX(0) rotate(0); }
            25% { transform: translateX(-8px) rotate(-8deg); }
            50% { transform: translateX(8px) rotate(8deg); }
            75% { transform: translateX(-8px) rotate(-8deg); }
            100% { transform: translateX(0) rotate(0); }
        }
        .target-cell { animation: subtle-pulse 2s infinite; cursor: pointer !important; }

        /* ANIMACIÓN DE TRANSICIÓN AL COLISEO */
        .colosseum-bg {
            background-color: rgba(15, 23, 42, 0.98);
            backdrop-filter: blur(8px);
        }
        .colosseum-container {
            transform-origin: 50% 70%;
            animation: zoom-into-arena 2.8s cubic-bezier(0.6, 0, 0.2, 1) forwards;
            will-change: transform, opacity;
        }
        .door-left {
            transform-origin: 320px 450px;
            animation: open-door-left 1.5s 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            transform-style: preserve-3d;
        }
        .door-right {
            transform-origin: 480px 450px;
            animation: open-door-right 1.5s 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            transform-style: preserve-3d;
        }
        @keyframes open-door-left {
            0% { transform: perspective(1200px) rotateY(0deg); }
            100% { transform: perspective(1200px) rotateY(120deg); }
        }
        @keyframes open-door-right {
            0% { transform: perspective(1200px) rotateY(0deg); }
            100% { transform: perspective(1200px) rotateY(-120deg); }
        }
        @keyframes zoom-into-arena {
            0% { transform: scale(0.6) translateY(50px); opacity: 0; filter: drop-shadow(0 0 0px rgba(251, 191, 36, 0)); }
            15% { transform: scale(1) translateY(0); opacity: 1; filter: drop-shadow(0 20px 50px rgba(251, 191, 36, 0.3)); }
            50% { transform: scale(1) translateY(0); opacity: 1; filter: drop-shadow(0 20px 50px rgba(251, 191, 36, 0.3)); }
            90% { opacity: 1; filter: drop-shadow(0 0 0px rgba(251, 191, 36, 0)); }
            100% { transform: scale(18) translateY(-3%); opacity: 0; filter: drop-shadow(0 0 0px rgba(251, 191, 36, 0)); }
        }
        @keyframes fade-out-text {
            0%, 50% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(20px); }
        }
        .colosseum-text {
            animation: fade-out-text 2s 0.6s forwards;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // === DATOS DE LA TABLA ===
        const DATA = [
          ["a", "us/er/ir", "um", "(varía)/s", "(varía)", "is/s", "(varía)/e", "us", "u", "es"],
          ["ae", "i", "i", "IS", "IS", "IS", "IS", "US", "US", "EI"],

          ["am", "um", "um", "Em", "(varía)", "em", "(varía)/e", "um", "u", "em"],
          ["a", "us/er/ir/e", "um", "(varía)/s", "(varía)", "is/s", "(varía)/e", "us", "u", "es"],
          ["a", "o", "o", "E", "e", "e", "i", "u", "u", "e"],
          ["ae", "i", "a", "es", "a", "es", "ia", "us", "ua", "es"],
          ["arum", "orum", "orum", "UM", "UM", "IUM", "IUM", "UUM", "UUM", "ERUM"],
          ["is", "is", "is", "ibus", "ibus", "ibus", "ibus", "ibus", "ibus", "ebus"],
          ["as", "os", "a", "es", "a", "es", "ia", "us", "ua", "es"],
          ["ae", "i", "a", "es", "a", "es", "ia", "us", "ua", "es"],
          ["is", "is", "is", "ibus", "ibus", "ibus", "ibus", "ibus", "ibus", "ebus"]

        // === BANCO DE PALABRAS ===
        const WORD_POOL = [
          [["rosa", "rosae", "rosae", "rosam", "rosa", "rosa", "rosae", "rosarum", "rosis", "rosas", "rosae", "rosis"]], 
          [["dominus", "domini", "domino", "dominum", "domine", "domino", "domini", "dominorum", "dominis", "dominos", "domini", "dominis"]], 
          [["bellum", "belli", "bello", "bellum", "bellum", "bello", "bella", "bellorum", "bellis", "bella", "bella", "bellis"]], 
          [["consul", "consulis", "consuli", "consulem", "consul", "consule", "consules", "consulum", "consulibus", "consules", "consules", "consulibus"]], 
          [["flumen", "fluminis", "flumini", "flumen", "flumen", "flumine", "flumina", "fluminum", "fluminibus", "flumina", "flumina", "fluminibus"]], 
          [["civis", "civis", "civi", "civem", "civis", "cive", "cives", "civium", "civibus", "cives", "cives", "civibus"]], 
          [["mare", "maris", "mari", "mare", "mare", "mari", "maria", "marium", "maribus", "maria", "maria", "maribus"]], 
          [["manus", "manus", "manui", "manum", "manus", "manu", "manus", "manuum", "manibus", "manus", "manus", "manibus"]],

        const ROW_LABELS = [
          { main: "NOMINATIVO", sub: "NS/PSO/AP" }, { main: "GENITIVO", sub: "MI" }, { main: "DATIVO", sub: "OI" },
          { main: "ACUSATIVO", sub: "OD" }, { main: "VOCATIVO", sub: "" }, { main: "ABLATIVO", sub: "C. CIRC/C. AG." },
          { main: "NOMINATIVO", sub: "los amigos" }, { main: "GENITIVO", sub: "de los amigos" }, { main: "DATIVO", sub: "a/para los amigos" },

          singHead: '#b8b1e4', plurHead: '#f57c7c', separator: '#3d5068',
          cellBorder: '#000000', emptySlot: 'rgba(255, 255, 255, 0.6)'

        const getCellColor = (r, c) => {
          const isGenitive = r === 1 || r === 7;
          switch (c) {
            case 0: return isGenitive ? COLORS.col1Gen : COLORS.col1Base;
            case 1: case 2: return isGenitive ? COLORS.col2Gen : COLORS.col2Base;
            case 3: case 4: case 5: case 6: return isGenitive ? COLORS.col3Gen : COLORS.col3Base;
            case 7: case 8: return isGenitive ? COLORS.col4Gen : COLORS.col4Base;
            case 9: return isGenitive ? COLORS.col5Gen : COLORS.col5Base;
            default: return '#ffffff';
          }
        };

        const ALL_HINTS = [
          { icon: "📖", title: "Uso del diccionario", text: "Enunciado: es el modo en el que aparecen las palabras en el diccionario. Existen variables e invariables.", style: "bg-blue-50 text-blue-900 border-blue-400" },
          { icon: "⚠️", title: "Sustantivos", text: "Aparecen bajo su enunciado normal (nominativo, genitivo), aunque algunas raíces de 3ra declinación cambian.", style: "bg-amber-50 text-amber-900 border-amber-400" },
          { icon: "🧠", title: "Acepciones", text: "Ningún diccionario te dará la traducción exacta. Presta atención a las diferentes acepciones según contexto.", style: "bg-emerald-50 text-emerald-900 border-emerald-400" },
          { icon: "💡", title: "Regla del Neutro", text: "¡Nominativo, Vocativo y Acusativo son siempre idénticos! En plural, siempre terminan en '-a' (o '-ia' / '-ua').", style: "bg-purple-50 text-purple-900 border-purple-400" },

        ];

        const single = (decl, caso, num, gen, tema3ra = null) => [{ decl, caso, num, gen, tema3ra }];

        // === RESTAURACIÓN DE LOS 30 EJERCICIOS BÁSICOS ===
        const EXERCISES_DATA_BASIC = [
          { w: "rosam", dict: "rosa, rosae", v: single("1ra", "Acusativo", "Singular", "Femenino"), sentence: "El poeta cortó a la rosa en el jardín.", target: "a la rosa", syntax: "Objeto Directo (OD)" },
          { w: "puellarum", dict: "puella, puellae", v: single("1ra", "Genitivo", "Plural", "Femenino"), sentence: "Los cantos de las niñas sonaban alegres.", target: "de las niñas", syntax: "Modificador Indirecto (MI)" },

          { w: "aquae", dict: "aqua, aquae", v: single("1ra", "Genitivo", "Singular", "Femenino"), sentence: "El dulce sonido del agua era relajante.", target: "del agua", syntax: "Modificador Indirecto (MI)" },
          { w: "vita", dict: "vita, vitae", v: single("1ra", "Nominativo", "Singular", "Femenino"), sentence: "La vida es un hermoso misterio.", target: "La vida", syntax: "Núcleo del Sujeto (NS)" },
          { w: "dominos", dict: "dominus, domini", v: single("2da", "Acusativo", "Plural", "Masculino"), sentence: "Los siervos saludaron a los amos.", target: "a los amos", syntax: "Objeto Directo (OD)" },
          { w: "amici", dict: "amicus, amici", v: single("2da", "Nominativo", "Plural", "Masculino"), sentence: "Los amigos siempre te apoyan en las dificultades.", target: "Los amigos", syntax: "Núcleo del Sujeto (NS)" },
          { w: "bella", dict: "bellum, belli", v: single("2da", "Acusativo", "Plural", "Neutro"), sentence: "El general romano detesta las guerras inútiles.", target: "las guerras", syntax: "Objeto Directo (OD)" },
          { w: "oppidum", dict: "oppidum, oppidi", v: single("2da", "Nominativo", "Singular", "Neutro"), sentence: "La ciudad fortificada resistió el asedio enemigo.", target: "La ciudad fortificada", syntax: "Núcleo del Sujeto (NS)" },
          { w: "puellae", dict: "puella, puellae", v: single("1ra", "Dativo", "Singular", "Femenino"), sentence: "El mensajero entregó una carta a la niña.", target: "a la niña", syntax: "Objeto Indirecto (OI)" },
          { w: "servum", dict: "servus, servi", v: single("2da", "Acusativo", "Singular", "Masculino"), sentence: "El cruel amo castigó al esclavo.", target: "al esclavo", syntax: "Objeto Directo (OD)" },
          { w: "agricolae", dict: "agricola, agricolae", v: single("1ra", "Nominativo", "Plural", "Masculino"), sentence: "Los agricultores trabajan la tierra fértil.", target: "Los agricultores", syntax: "Núcleo del Sujeto (NS)" },
          { w: "templis", dict: "templum, templi", v: single("2da", "Ablativo", "Plural", "Neutro"), sentence: "Los sacerdotes rezaban en los templos de la ciudad.", target: "en los templos", syntax: "Complemento Circunstancial (CC)" },
          { w: "puerorum", dict: "puer, pueri", v: single("2da", "Genitivo", "Plural", "Masculino"), sentence: "Los alegres gritos de los niños asustaron a los pájaros.", target: "de los niños", syntax: "Modificador Indirecto (MI)" },
          { w: "deis", dict: "deus, dei", v: single("2da", "Dativo", "Plural", "Masculino"), sentence: "Los ciudadanos construyeron grandes altares para los dioses.", target: "para los dioses", syntax: "Objeto Indirecto (OI)" },
          { w: "lupam", dict: "lupa, lupae", v: single("1ra", "Acusativo", "Singular", "Femenino"), sentence: "El audaz cazador vio a la loba en el bosque profundo.", target: "a la loba", syntax: "Objeto Directo (OD)" },
          { w: "filius", dict: "filius, filii", v: single("2da", "Nominativo", "Singular", "Masculino"), sentence: "El buen hijo obedece siempre a su respetado padre.", target: "El buen hijo", syntax: "Núcleo del Sujeto (NS)" },

          { w: "nautis", dict: "nauta, nautae", v: single("1ra", "Dativo", "Plural", "Masculino"), sentence: "El clima favorable dio mucha esperanza a los marineros.", target: "a los marineros", syntax: "Objeto Indirecto (OI)" },

          { w: "magister", dict: "magister, magistri", v: single("2da", "Nominativo", "Singular", "Masculino"), sentence: "El estricto maestro enseña retórica en la escuela de Roma.", target: "El estricto maestro", syntax: "Núcleo del Sujeto (NS)" },
          { w: "pericula", dict: "periculum, periculi", v: single("2da", "Nominativo", "Plural", "Neutro"), sentence: "Los inminentes peligros del largo viaje eran muy conocidos.", target: "Los inminentes peligros", syntax: "Núcleo del Sujeto (NS)" },
          { w: "viri", dict: "vir, viri", v: single("2da", "Genitivo", "Singular", "Masculino"), sentence: "El enorme valor del hombre fue admirado por todo el senado.", target: "del hombre", syntax: "Modificador Indirecto (MI)" },

          { w: "cena", dict: "cena, cenae", v: single("1ra", "Ablativo", "Singular", "Femenino"), sentence: "Los invitados rieron mucho durante la cena.", target: "durante la cena", syntax: "Complemento Circunstancial (CC)" },
          { w: "lunae", dict: "luna, lunae", v: single("1ra", "Genitivo", "Singular", "Femenino"), sentence: "La pálida luz de la luna iluminaba el camino.", target: "de la luna", syntax: "Modificador Indirecto (MI)" },

        // === RESTAURACIÓN DE LOS 40 EJERCICIOS AVANZADOS ===
        const EXERCISES_DATA_ADVANCED = [
          { w: "regem", dict: "rex, regis", v: single("3ra", "Acusativo", "Singular", "Masculino", "Consonante"), sentence: "Todo el pueblo aclamó al rey tras la victoria.", target: "al rey", syntax: "Objeto Directo (OD)" },

                      [isAdvancedUnlocked ? 'advanced' : 'basic']: { time: timer, score: finalScore, bonus: bonus }
                  }));

                    <div className="bg-white rounded-2xl p-6 sm:p-8 max-w-sm w-full text-center shadow-2xl relative" style={{ animation: 'scale-up 0.3s ease-out' }}>
                      <button onClick={() => setShowCompleteModal(false)} className="absolute top-3 right-4 text-gray-400 hover:text-gray-800 text-2xl font-bold leading-none">&times;</button>
                      <h2 className="text-3xl font-black text-green-600 mb-1">{isAdvancedUnlocked ? "¡Tabla Épica!" : `¡Felicidades, ${nombre}!`}</h2>
                      <p className="text-sm sm:text-base text-gray-600 mb-4">{isAdvancedUnlocked ? "Has logrado armar TODAS las declinaciones latinas." : "Has dominado la 1ª y 2ª declinación perfecta."}</p>
                      
                      {/* CAJA DE ESTADÍSTICAS */}
                      <div className="bg-slate-50 border border-slate-200 rounded-lg p-4 mb-6 text-sm text-slate-600 font-bold tracking-wide shadow-inner text-left">
                        {stats?.basic && isAdvancedUnlocked && (
                            <div className="mb-3 border-b border-slate-200 pb-3">
                                <p className="uppercase text-slate-400 text-xs mb-1">Fase Básica Guardada</p>
                                <div className="flex justify-between items-center mb-1">
                                    <span>⏳ Tiempo: <span className="text-slate-800">{formatTime(stats.basic.time)}</span></span>
                                    <span className="text-green-600">🏆 {stats.basic.score} pts</span>
                                </div>
                            </div>
                        )}
                        <div className="mb-2">
                            <p className="uppercase text-slate-400 text-xs mb-1">{isAdvancedUnlocked ? "Fase Avanzada" : "Fase Básica"}</p>
                            <div className="flex justify-between items-center mb-1">
                                <span>⏳ Tiempo transcurrido:</span>
                                <span className="text-blue-600 text-lg">{formatTime(timer)}</span>
                            </div>
                            <div className="flex justify-between items-center mb-1">
                                <span>🎯 Errores cometidos:</span>
                                <span className="text-red-500 text-lg">{mistakesCurrentPhase}</span>
                            </div>
                        </div>
                        {stats?.[isAdvancedUnlocked ? 'advanced' : 'basic']?.bonus > 0 && (
                            <div className="text-yellow-600 font-black text-sm text-center my-3 bg-yellow-50 py-1 rounded">
                                ¡Bonus por precisión tabla: +{stats[isAdvancedUnlocked ? 'advanced' : 'basic'].bonus} pts!
                            </div>
                        )}
                        <div className="flex justify-between items-center border-t border-slate-300 pt-3 mt-2 uppercase">
                            <span>🌟 PUNTAJE TOTAL:</span>
                            <span className="text-yellow-600 text-3xl font-black">{scoreTotal}</span>
                        </div>
                      </div>
                      
                      <div className="flex flex-col gap-2.5">
                        {!isAdvancedUnlocked ? (
                          <React.Fragment>
                            <button onClick={() => startExercises('basic')} className="bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-xl w-full text-sm sm:text-base shadow-md transition-transform hover:scale-105">
                              📝 Ejercicios (1ª y 2ª)
                            </button>
                          </React.Fragment>
                        ) : (
                          <button onClick={() => startExercises('advanced')} className="bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-xl w-full text-sm sm:text-base shadow-md transition-transform hover:scale-105">
                            📝 Ejercicios Avanzados
                          </button>
                        )}
                        <button onClick={() => setShowCompleteModal(false)} className="bg-amber-100 hover:bg-amber-200 text-amber-900 border border-amber-300 font-bold py-2.5 rounded-xl w-full text-sm sm:text-base transition shadow-sm">
                          👀 Ver tabla completa
                        </button>
                        <button onClick={resetGame} className="bg-slate-200 hover:bg-slate-300 text-slate-800 font-bold py-2.5 rounded-xl w-full text-sm sm:text-base transition">Jugar de Nuevo</button>
                      </div>
                    </div>
                  </div>
                )}

                {/* ANIMACIÓN DE DESBLOQUEO DEL CANDADO */}
                {unlockStage > 0 && (
                  <div className="fixed inset-0 bg-slate-900/95 flex flex-col items-center justify-center z-[100] backdrop-blur-md">
                      <div className="text-center px-4">
                          <div className="text-[100px] sm:text-[140px] mb-8 h-40 flex items-center justify-center">
                              {unlockStage === 1 && <span className="inline-block" style={{ animation: 'shake 0.15s infinite' }}>🔒</span>}
                              {unlockStage === 2 && <span className="inline-block scale-150">💥</span>}
                              {unlockStage === 3 && <span className="inline-block drop-shadow-[0_0_40px_rgba(250,204,21,0.8)]" style={{ animation: 'scale-up 0.5s ease-out' }}>🔓</span>}
                          </div>
                          {unlockStage === 3 && (
                              <div style={{ animation: 'scale-up 0.5s ease-out' }}>
                                  <h2 className="text-3xl sm:text-5xl font-black text-yellow-400 mb-4 drop-shadow-md">¡Primera Etapa Superada!</h2>
                                  <p className="text-xl sm:text-3xl text-white font-bold tracking-wide">¡{nombre}, te estás convirtiendo en un romano! 🏛️</p>
                              </div>
                          )}
                      </div>
                  </div>
                )}
              </div>
            );
          }

          // ================= RENDERIZADO PRINCIPAL COMPLETO =================
          return (
            <React.Fragment>
              {content}
              
              {/* ANIMACIÓN DE ENTRADA AL COLISEO GLOBAl */}
              {isEnteringColosseum && (
                  <div className="fixed inset-0 z-[200] flex flex-col items-center justify-center overflow-hidden colosseum-bg">
                      <div className="colosseum-container flex items-center justify-center w-full max-w-5xl h-full p-4 pointer-events-none">
                          <svg viewBox="0 0 800 600" className="w-full h-full drop-shadow-[0_10px_40px_rgba(0,0,0,0.9)]">
                              <defs>
                                  <radialGradient id="arenaLight" cx="50%" cy="50%" r="50%">
                                      <stop offset="0%" stopColor="#fef08a" stopOpacity="1" />
                                      <stop offset="100%" stopColor="#b45309" stopOpacity="1" />
                                  </radialGradient>
                              </defs>
                              <rect x="300" y="320" width="200" height="250" fill="url(#arenaLight)" />
                              
                              <text x="400" y="470" fontFamily="serif" fontSize="28" fontWeight="bold" fill="#78350f" textAnchor="middle" opacity="0.9" letterSpacing="2">IN LUDUM!</text>
                              <ellipse cx="400" cy="550" rx="380" ry="40" fill="#1c1917" />
                              <path d="M50,450 C50,250 150,150 400,150 L400,340 A80,80 0 0,0 320,420 L320,550 C150,550 50,550 50,450 Z" fill="#94a3b8" stroke="#334155" strokeWidth="4"/>
                              <path d="M750,450 C750,250 650,150 400,150 L400,340 A80,80 0 0,1 480,420 L480,550 C650,550 750,550 750,450 Z" fill="#64748b" stroke="#334155" strokeWidth="4"/>

                              <path d="M120,440 A30,30 0 0,1 180,440 L180,550 L120,550 Z" fill="#0f172a"/>
                              <path d="M210,400 A30,30 0 0,1 270,400 L270,550 L210,550 Z" fill="#0f172a"/>
                              <path d="M530,400 A30,30 0 0,1 590,400 L590,550 L530,550 Z" fill="#0f172a"/>
                              <path d="M620,440 A30,30 0 0,1 680,440 L680,550 L620,550 Z" fill="#0f172a"/>

                              <rect x="180" y="260" width="20" height="40" fill="#0f172a" rx="10"/>
                              <rect x="250" y="230" width="20" height="40" fill="#0f172a" rx="10"/>
                              <rect x="530" y="230" width="20" height="40" fill="#0f172a" rx="10"/>
                              <rect x="600" y="260" width="20" height="40" fill="#0f172a" rx="10"/>

                              <text x="400" y="280" fontFamily="serif" fontSize="30" fontWeight="bold" fill="#334155" textAnchor="middle" letterSpacing="6">COLOSSEUM</text>

                              {/* PUERTA IZQUIERDA */}
                              <g className="door-left">
                                  <path d="M320,420 A80,80 0 0,1 400,340 L400,550 L320,550 Z" fill="#451a03" stroke="#1c1917" strokeWidth="4"/>
                                  <path d="M335,420 A65,65 0 0,1 390,360 L390,535 L335,535 Z" fill="#78350f" stroke="#292524" strokeWidth="2"/>
                                  <circle cx="380" cy="460" r="8" fill="#fbbf24" stroke="#d97706" strokeWidth="2"/>
                                  <circle cx="380" cy="460" r="4" fill="#451a03"/>
                              </g>

                              {/* PUERTA DERECHA */}
                              <g className="door-right">
                                  <path d="M400,340 A80,80 0 0,1 480,420 L480,550 L400,550 Z" fill="#451a03" stroke="#1c1917" strokeWidth="4"/>
                                  <path d="M410,360 A65,65 0 0,1 465,420 L465,535 L410,535 Z" fill="#78350f" stroke="#292524" strokeWidth="2"/>
                                  <circle cx="420" cy="460" r="8" fill="#fbbf24" stroke="#d97706" strokeWidth="2"/>
                                  <circle cx="420" cy="460" r="4" fill="#451a03"/>
                              </g>
                          </svg>
                      </div>

                      {/* Texto Superpuesto Personalizado */}
                      <h2 className="colosseum-text absolute bottom-[15%] text-4xl sm:text-6xl font-black text-amber-400 drop-shadow-[0_4px_20px_rgba(0,0,0,1)] tracking-[0.2em] uppercase text-center w-full px-4">
                          {transitionText}
                      </h2>
                  </div>
              )}
            </React.Fragment>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
