                      else if (mistakesCurrentPhase === 1) bonus = 70;

                  <div className="flex flex-wrap justify-center content-start gap-1.5 sm:gap-2 h-[20vh] max-h-32 sm:max-h-40 overflow-y-auto custom-scrollbar p-1">
                    {uniquePieces.map((val) => (
                      <div key={val} draggable onDragStart={(e) => handleDragStart(e, val)} onClick={() => setSelectedPiece(val)}
                        className={`cursor-pointer px-2 sm:px-3 py-1 sm:py-1.5 border-2 rounded-lg font-bold text-xs sm:text-sm shadow-sm transition-all flex items-center select-none ${selectedPiece === val ? 'bg-blue-600 text-white border-blue-800 scale-110 shadow-md ring-2 ring-blue-300' : 'bg-gray-50 text-slate-800 border-slate-300 hover:bg-slate-200 active:scale-95'}`}>
                        {val} <span className={`text-[10px] ml-1 px-1 rounded-full ${selectedPiece === val ? 'bg-blue-800 text-blue-100' : 'bg-slate-200 text-slate-500'}`}>x{remainingPieces[val]}</span>
                      </div>
                    ))}
                    {uniquePieces.length === 0 && (
                      <div className="flex flex-col items-center justify-center w-full mt-1">
                        <div className="text-green-600 font-bold text-lg animate-pulse mb-2">¡Todas ubicadas! 🎉</div>
                        <button onClick={() => setShowCompleteModal(true)} className="bg-blue-600 hover:bg-blue-700 text-white font-black py-2.5 px-6 rounded-xl shadow-md transition-transform hover:scale-105 active:scale-95 flex items-center gap-2">
                          Ver Resultados ➔
                        </button>
                      </div>
                    )}
                  </div>
                </div>

                {/* MODAL DE COMPLETADO Y ESTADÍSTICAS */}
                {showCompleteModal && (
                  <div className="fixed inset-0 bg-slate-900/70 flex items-center justify-center z-[60] p-4 backdrop-blur-sm">
                    <div className="bg-white rounded-2xl p-6 sm:p-8 max-w-sm w-full text-center shadow-2xl relative" style={{ animation: 'scale-up 0.3s ease-out' }}>
                      <button onClick={() => setShowCompleteModal(false)} className="absolute top-3 right-4 text-gray-400 hover:text-gray-800 text-2xl font-bold leading-none">&times;</button>
                      <h2 className="text-3xl font-black text-green-600 mb-1">{isAdvancedUnlocked ? "¡Tabla Épica!" : `¡Felicidades, ${nombre}!`}</h2>
                      <p className="text-sm sm:text-base text-gray-600 mb-4">{isAdvancedUnlocked ? "Has logrado armar TODAS las declinaciones latinas." : "Has dominado la 1ª y 2ª declinación perfecta."}</p>
                      
                      {/* CAJA DE ESTADÍSTICAS */}
                      <div className="bg-slate-50 border border-slate-200 rounded-lg p-4 mb-6 text-sm text-slate-600 font-bold tracking-wide shadow-inner text-left">
                        {stats?.basic && isAdvancedUnlocked && (
                            <div className="mb-3 border-b border-slate-200 pb-3">
                                <p className="uppercase text-slate-400 text-xs mb-1">Fase Básica Guardada</p>
                                <div className="flex justify-between items-center mb-1">
                                    <span>⏳ Tiempo: <span className="text-slate-800">{formatTime(stats.basic.time)}</span></span>
                                    <span className="text-green-600">🏆 {stats.basic.score} pts</span>
                                </div>
                            </div>
                        )}
                        <div className="mb-2">
                            <p className="uppercase text-slate-400 text-xs mb-1">{isAdvancedUnlocked ? "Fase Avanzada" : "Fase Básica"}</p>
                            <div className="flex justify-between items-center mb-1">
                                <span>⏳ Tiempo transcurrido:</span>
                                <span className="text-blue-600 text-lg">{formatTime(timer)}</span>
                            </div>
                            <div className="flex justify-between items-center mb-1">
                                <span>🎯 Errores cometidos:</span>
                                <span className="text-red-500 text-lg">{mistakesCurrentPhase}</span>
                            </div>
                        </div>
                        {stats?.[isAdvancedUnlocked ? 'advanced' : 'basic']?.bonus > 0 && (
                            <div className="text-yellow-600 font-black text-sm text-center my-3 bg-yellow-50 py-1 rounded">
                                ¡Bonus por precisión tabla: +{stats[isAdvancedUnlocked ? 'advanced' : 'basic'].bonus} pts!
                            </div>
                        )}
                        <div className="flex justify-between items-center border-t border-slate-300 pt-3 mt-2 uppercase">
                            <span>🌟 PUNTAJE TOTAL:</span>
                            <span className="text-yellow-600 text-3xl font-black">{scoreTotal}</span>
                        </div>
                      </div>
                      
                      <div className="flex flex-col gap-2.5">
                        {!isAdvancedUnlocked ? (
                          <React.Fragment>
                            <button onClick={() => startExercises('basic')} className="bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-xl w-full text-sm sm:text-base shadow-md transition-transform hover:scale-105">
                              📝 Ejercicios (1ª y 2ª)
                            </button>
                          </React.Fragment>
                        ) : (
                          <button onClick={() => startExercises('advanced')} className="bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-xl w-full text-sm sm:text-base shadow-md transition-transform hover:scale-105">
                            📝 Ejercicios Avanzados
                          </button>
                        )}
                        <button onClick={() => setShowCompleteModal(false)} className="bg-amber-100 hover:bg-amber-200 text-amber-900 border border-amber-300 font-bold py-2.5 rounded-xl w-full text-sm sm:text-base transition shadow-sm">
                          👀 Ver tabla completa
                        </button>
                        <button onClick={resetGame} className="bg-slate-200 hover:bg-slate-300 text-slate-800 font-bold py-2.5 rounded-xl w-full text-sm sm:text-base transition">Jugar de Nuevo</button>
                      </div>
                    </div>
                  </div>
                )}

                {/* ANIMACIÓN DE DESBLOQUEO DEL CANDADO */}
                {unlockStage > 0 && (
                  <div className="fixed inset-0 bg-slate-900/95 flex flex-col items-center justify-center z-[100] backdrop-blur-md">
                      <div className="text-center px-4">
                          <div className="text-[100px] sm:text-[140px] mb-8 h-40 flex items-center justify-center">
                              {unlockStage === 1 && <span className="inline-block" style={{ animation: 'shake 0.15s infinite' }}>🔒</span>}
                              {unlockStage === 2 && <span className="inline-block scale-150">💥</span>}
                              {unlockStage === 3 && <span className="inline-block drop-shadow-[0_0_40px_rgba(250,204,21,0.8)]" style={{ animation: 'scale-up 0.5s ease-out' }}>🔓</span>}
                          </div>
                          {unlockStage === 3 && (
                              <div style={{ animation: 'scale-up 0.5s ease-out' }}>
                                  <h2 className="text-3xl sm:text-5xl font-black text-yellow-400 mb-4 drop-shadow-md">¡Primera Etapa Superada!</h2>
                                  <p className="text-xl sm:text-3xl text-white font-bold tracking-wide">¡{nombre}, te estás convirtiendo en un romano! 🏛️</p>
                              </div>
                          )}
                      </div>
                  </div>
                )}
              </div>
            );
          }

          // ================= RENDERIZADO PRINCIPAL COMPLETO =================
          return (
            <React.Fragment>
              {content}
              
              {/* ANIMACIÓN DE ENTRADA AL COLISEO GLOBAl */}
              {isEnteringColosseum && (
                  <div className="fixed inset-0 z-[200] flex flex-col items-center justify-center overflow-hidden colosseum-bg">
                      <div className="colosseum-container flex items-center justify-center w-full max-w-5xl h-full p-4 pointer-events-none">
                          <svg viewBox="0 0 800 600" className="w-full h-full drop-shadow-[0_10px_40px_rgba(0,0,0,0.9)]">
                              <defs>
                                  <radialGradient id="arenaLight" cx="50%" cy="50%" r="50%">
                                      <stop offset="0%" stopColor="#fef08a" stopOpacity="1" />
                                      <stop offset="100%" stopColor="#b45309" stopOpacity="1" />
                                  </radialGradient>
                              </defs>
                              <rect x="300" y="320" width="200" height="250" fill="url(#arenaLight)" />
                              
                              <text x="400" y="470" fontFamily="serif" fontSize="28" fontWeight="bold" fill="#78350f" textAnchor="middle" opacity="0.9" letterSpacing="2">IN LUDUM!</text>
                              <ellipse cx="400" cy="550" rx="380" ry="40" fill="#1c1917" />
                              <path d="M50,450 C50,250 150,150 400,150 L400,340 A80,80 0 0,0 320,420 L320,550 C150,550 50,550 50,450 Z" fill="#94a3b8" stroke="#334155" strokeWidth="4"/>
                              <path d="M750,450 C750,250 650,150 400,150 L400,340 A80,80 0 0,1 480,420 L480,550 C650,550 750,550 750,450 Z" fill="#64748b" stroke="#334155" strokeWidth="4"/>

                              <path d="M120,440 A30,30 0 0,1 180,440 L180,550 L120,550 Z" fill="#0f172a"/>
                              <path d="M210,400 A30,30 0 0,1 270,400 L270,550 L210,550 Z" fill="#0f172a"/>
                              <path d="M530,400 A30,30 0 0,1 590,400 L590,550 L530,550 Z" fill="#0f172a"/>
                              <path d="M620,440 A30,30 0 0,1 680,440 L680,550 L620,550 Z" fill="#0f172a"/>

                              <rect x="180" y="260" width="20" height="40" fill="#0f172a" rx="10"/>
                              <rect x="250" y="230" width="20" height="40" fill="#0f172a" rx="10"/>
                              <rect x="530" y="230" width="20" height="40" fill="#0f172a" rx="10"/>
                              <rect x="600" y="260" width="20" height="40" fill="#0f172a" rx="10"/>

                              <text x="400" y="280" fontFamily="serif" fontSize="30" fontWeight="bold" fill="#334155" textAnchor="middle" letterSpacing="6">COLOSSEUM</text>

                              {/* PUERTA IZQUIERDA */}
                              <g className="door-left">
                                  <path d="M320,420 A80,80 0 0,1 400,340 L400,550 L320,550 Z" fill="#451a03" stroke="#1c1917" strokeWidth="4"/>
                                  <path d="M335,420 A65,65 0 0,1 390,360 L390,535 L335,535 Z" fill="#78350f" stroke="#292524" strokeWidth="2"/>
                                  <circle cx="380" cy="460" r="8" fill="#fbbf24" stroke="#d97706" strokeWidth="2"/>
                                  <circle cx="380" cy="460" r="4" fill="#451a03"/>
                              </g>

                              {/* PUERTA DERECHA */}
                              <g className="door-right">
                                  <path d="M400,340 A80,80 0 0,1 480,420 L480,550 L400,550 Z" fill="#451a03" stroke="#1c1917" strokeWidth="4"/>
                                  <path d="M410,360 A65,65 0 0,1 465,420 L465,535 L410,535 Z" fill="#78350f" stroke="#292524" strokeWidth="2"/>
                                  <circle cx="420" cy="460" r="8" fill="#fbbf24" stroke="#d97706" strokeWidth="2"/>
                                  <circle cx="420" cy="460" r="4" fill="#451a03"/>
                              </g>
                          </svg>
                      </div>

                      {/* Texto Superpuesto Personalizado */}
                      <h2 className="colosseum-text absolute bottom-[15%] text-4xl sm:text-6xl font-black text-amber-400 drop-shadow-[0_4px_20px_rgba(0,0,0,1)] tracking-[0.2em] uppercase text-center w-full px-4">
                          {transitionText}
                      </h2>
                  </div>
              )}
            </React.Fragment>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>









</body></html>
